name: Build and Deploy Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pandoc
        run: |
          wget -q https://github.com/jgm/pandoc/releases/download/3.5/pandoc-3.5-1-amd64.deb
          sudo dpkg -i pandoc-3.5-1-amd64.deb

      - name: Build site
        run: |
          mkdir -p _site/cv _site/assets

          # Preprocess org file:
          # 1. strip @@latex:...@@ inline snippets
          # 2. strip {{{macro}}} calls (e.g. needspace)
          # 3. strip trailing \\ ONLY on numbered list item lines (N. *Title*\\)
          #    — pandoc requires bold closing * to be followed by whitespace/punctuation;
          #    \\ blocks that recognition on publication title lines
          # 4. drop "Contributions to Peer-Review" section (last section in file)
          sed 's/@@latex:[^@]*@@//g' academic/academic-cv.org \
            | sed 's/{{{[^}]*}}}//g' \
            | sed '/^[[:space:]]*[0-9][0-9]*\./s/\\\\$//' \
            | sed 's/\*\\\\$/\*/' \
            | awk '/^\* Contributions to Peer-Review/{exit} {print}' \
            > /tmp/cv-clean.org

          # Convert CV org -> HTML
          # --shift-heading-level-by=1: maps *Section -> h2, **Sub -> h3, ***Sub -> h4
          pandoc /tmp/cv-clean.org \
            --from=org \
            --to=html5 \
            --standalone \
            --shift-heading-level-by=1 \
            --css=../assets/cv.css?v=4 \
            --metadata title="Arnab K. Dey" \
            --output=_site/cv/index.html

          # Wrap the name in a styled span for prominent display
          sed -i 's|<p>Arnab K. Dey<br />|<p><span class="cv-name">Arnab K. Dey</span><br />|' _site/cv/index.html

          # Append back link to CV page
          echo '<p class="back-link"><a href="/">Back to home</a></p>' >> _site/cv/index.html

          # Copy landing page and assets
          cp index.html _site/index.html
          cp assets/cv.css _site/assets/cv.css

          # Copy CNAME so GitHub Pages preserves the custom domain
          cp CNAME _site/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
